name: Fast CI & Auto Build Release APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  fast-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17 for Android Compiler
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for Gradle Wrapper
        run: chmod +x gradlew

      - name: Compile and Build Butt Network Production APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Sovereign App Artifact to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: Butt-Network-v2-Release-APK
          path: app/build/outputs/apk/release/app-release.apk
