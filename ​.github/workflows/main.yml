name: Build and Deploy APK
on: 
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install Dependencies
      run: flutter pub get

    # नाम का चक्कर खत्म करने के लिए डायरेक्ट फ्लटर का कमांड
    - name: Build Release APK
      run: flutter build apk --release

    # यहाँ हमने नाम हटाकर सिर्फ स्टार (*) लगा दिया है, जो भी नाम होगा यह उसे ढूंढ लेगा
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Yieye-Network-Release-APK
        path: build/app/outputs/flutter-apk/*.apk
