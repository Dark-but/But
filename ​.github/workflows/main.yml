name: Build and Deploy APK
on: 
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # 1. गिटहब का जून 2026 का बिल्कुल लेटेस्ट और सिक्योर चेकआउट वर्जन
    - name: Checkout Code
      uses: actions/checkout@v7

    # 2. जावा का लेटेस्ट लॉन्ग-टर्म सपोर्ट (LTS) वर्जन सेट करना
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. गिटहब एक्शन्स फॉर ग्रैडल का बिल्कुल लेटेस्ट V6 वर्जन
    # इसमें हम पुराना क्रैश होने वाला कैसिंग सर्वर हटाकर नया ओपन-सोर्स 'basic' प्रोवाइडर यूज़ कर रहे हैं
    - name: Setup Gradle (Latest v6)
      uses: gradle/actions/setup-gradle@v6
      with:
        gradle-version: 9.5.0  # आपका प्रोजेक्ट सीधे लेटेस्ट ग्रैडल इंजन पर चलेगा
        cache-provider: basic  # गिटहब के क्रैश होने वाले सर्वर को बायपास करने का लेटेस्ट तरीका

    # 4. बिना पुराने रैपर फाइलों के सीधे अपग्रेडेड ग्लोबल ग्रैडल कमांड से बिल्ड करना
    # ताकि पुराने कोड और पुरानी फाइलों का एरर आए ही नहीं
    - name: Build Release APK
      run: gradle assembleRelease --no-daemon --stacktrace

    # 5. बनी हुई फ्रेश एपीके को डाउनलोड के लिए डिप्लॉय करना
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Sovereign-Wallet-Build
        path: app/build/outputs/apk/release/*.apk
