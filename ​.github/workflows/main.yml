name: Build and Deploy APK
on: 
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # ग्रैडल को सेटअप करना (कैश को डिसेबल रखा है ताकि पुराना एरर न आए)
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        cache-disabled: true

    # कॉपायलट का सुझाया हुआ असली फिक्स: रैपर को परमिशन देना और सही मॉड्यूल टारगेट करना
    - name: Build Release APK
      run: |
        chmod +x ./gradlew
        ./gradlew :app:assembleRelease --no-daemon --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Sovereign-Wallet-Build
        path: app/build/outputs/apk/release/*.apk
